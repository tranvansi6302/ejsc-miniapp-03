syntax = "proto3";
import "google/protobuf/wrappers.proto";
import "result.proto";
import "common.proto";
package PaymentMethod;

service PaymentMethodQuery {
  rpc GetAllPaymentMethods(GetAllPaymentMethodsRequest) returns (CommonResult);
  rpc GetDetailPaymentMethod(GetDetailPaymentMethodRequest) returns (CommonResult);
  rpc AdminGetAllPaymentMethods(AdminGetAllPaymentMethodsRequest) returns (CommonResult);
}

message GetAllPaymentMethodsRequest {
      optional SkipTakeOption SkipTakeOption = 1;
      optional PagingOption PagingOption = 2;
      repeated OrderByOption OrderBy = 3;
}
message GetDetailPaymentMethodRequest {
      optional google.protobuf.Int32Value Id = 1;
}

message AdminGetAllPaymentMethodsRequest {
      optional SkipTakeOption SkipTakeOption = 1;
      optional PagingOption PagingOption = 2;
      repeated FilterOption Filter = 3;
      repeated OrderByOption OrderBy = 4;
}
