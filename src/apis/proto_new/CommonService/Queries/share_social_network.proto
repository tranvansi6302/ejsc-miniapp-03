syntax = "proto3";
import "result.proto";
import "google/protobuf/wrappers.proto";
package ShareSocialNetwork;

service ShareSocialNetworkQuery {
    rpc GetDetailShareSocialNetwork(GetDetailShareSocialNetworkRequest) returns (CommonResult);
    rpc GetAllShareSocialNetworks(GetAllShareSocialNetworksRequest) returns (CommonResult);
}

message GetDetailShareSocialNetworkRequest{
    optional google.protobuf.StringValue Id = 1;
}
message GetAllShareSocialNetworksRequest {}

