syntax = "proto3";
import "result.proto";
import "google/protobuf/wrappers.proto";
package ConfigEmoji;

service ConfigEmojiQuery {
  rpc GetDetailConfigEmoji(GetDetailConfigEmojiRequest) returns (CommonResult);
  rpc GetAllConfigEmojis(GetAllConfigEmojisRequest) returns (CommonResult);
}

message GetDetailConfigEmojiRequest {
  optional google.protobuf.StringValue Id = 1;
}

message GetAllConfigEmojisRequest {
  optional google.protobuf.StringValue Type = 1;
}
