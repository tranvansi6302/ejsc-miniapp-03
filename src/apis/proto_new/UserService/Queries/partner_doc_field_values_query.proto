syntax = "proto3";
import "google/protobuf/wrappers.proto";
import "result.proto";
import "common.proto";
package PartnerDocFieldValues;

service PartnerDocFieldValuesQuery {
  rpc GetAllPartnerDocFieldValues(GetAllPartnerDocFieldValuesRequest) returns (CommonResult);
  rpc GetDetailPartnerDocFieldValues(GetDetailPartnerDocFieldValuesRequest) returns (CommonResult);
  rpc AdminGetAllPartnerDocFieldValues(GetAllPartnerDocFieldValuesRequest) returns (CommonResult);
  rpc AdminGetDetailPartnerDocFieldValues(GetDetailPartnerDocFieldValuesRequest) returns (CommonResult);
}

message GetAllPartnerDocFieldValuesRequest {
      optional SkipTakeOption SkipTakeOption = 1;
      optional PagingOption PagingOption = 2;
      repeated FilterOption Filter = 3;
      repeated OrderByOption OrderBy = 4;
}
message GetDetailPartnerDocFieldValuesRequest {
      optional google.protobuf.Int32Value Id = 1;
}
