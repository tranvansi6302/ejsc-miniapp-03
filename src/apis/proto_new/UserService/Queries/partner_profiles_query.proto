syntax = "proto3";
import "google/protobuf/wrappers.proto";
import "result.proto";
import "common.proto";
package PartnerProfiles;

service PartnerProfilesQuery {
  rpc GetAllPartnerProfiles(GetAllPartnerProfilesRequest) returns (CommonResult);
  rpc GetDetailPartnerProfiles(GetDetailPartnerProfilesRequest) returns (CommonResult);
  rpc AdminGetAllPartnerProfiles(GetAllPartnerProfilesRequest) returns (CommonResult);
  rpc AdminGetDetailPartnerProfiles(AdminGetDetailPartnerProfilesRequest) returns (CommonResult);
}

message GetAllPartnerProfilesRequest {
      optional SkipTakeOption SkipTakeOption = 1;
      optional PagingOption PagingOption = 2;
      repeated FilterOption Filter = 3;
      repeated OrderByOption OrderBy = 4;
}
message GetDetailPartnerProfilesRequest {
      optional google.protobuf.Int32Value Id = 1;
      optional google.protobuf.Int32Value InfomationId = 2;
}
message AdminGetDetailPartnerProfilesRequest {
      optional google.protobuf.Int32Value Id = 1;
}
