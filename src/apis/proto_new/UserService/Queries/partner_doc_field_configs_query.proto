syntax = "proto3";
import "google/protobuf/wrappers.proto";
import "result.proto";
import "common.proto";
package PartnerDocFieldConfigs;

service PartnerDocFieldConfigsQuery {
  rpc GetAllPartnerDocFieldConfigs(GetAllPartnerDocFieldConfigsRequest) returns (CommonResult);
  rpc GetDetailPartnerDocFieldConfigs(GetDetailPartnerDocFieldConfigsRequest) returns (CommonResult);
  rpc AdminGetAllPartnerDocFieldConfigs(GetAllPartnerDocFieldConfigsRequest) returns (CommonResult);
  rpc AdminGetDetailPartnerDocFieldConfigs(GetDetailPartnerDocFieldConfigsRequest) returns (CommonResult);
}

message GetAllPartnerDocFieldConfigsRequest {
      optional SkipTakeOption SkipTakeOption = 1;
      optional PagingOption PagingOption = 2;
      repeated FilterOption Filter = 3;
      repeated OrderByOption OrderBy = 4;
}
message GetDetailPartnerDocFieldConfigsRequest {
      optional google.protobuf.Int32Value Id = 1;
}
